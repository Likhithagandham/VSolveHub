<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Track Booking — VSolveHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="page-booking">
  <header class="site-header site-header--minimal">
    <a href="index.html" class="logo"><span class="logo-mark">VSH</span></a>
    <nav class="flow-steps" aria-label="Booking progress">
      <span class="flow-step done">Book</span>
      <span class="flow-step done">OTP</span>
      <span class="flow-step done">Confirm</span>
      <span class="flow-step active">Track</span>
    </nav>
  </header>

  <main class="booking-main">
    <section class="section booking-card-section">
      <div class="section-inner booking-card">
        <h1 class="section-title">Track Your Booking</h1>
        <p class="booking-ref">Ref: <strong id="track-ref">—</strong></p>
        <p class="lead-hint" id="track-service"></p>

        <ol class="status-timeline" id="status-timeline" aria-label="Booking status"></ol>

        <p class="last-updated" id="track-updated"></p>

        <div class="booking-actions">
          <a href="#" id="track-whatsapp" class="btn-primary" target="_blank" rel="noopener noreferrer">Chat on WhatsApp</a>
          <a href="index.html" class="btn-secondary">Book Another Service</a>
        </div>
      </div>
    </section>
  </main>

  <script src="data.js"></script>
  <script src="track.js"></script>
</body>
</html>
